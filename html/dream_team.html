<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/pokemon_list.css">
    <link rel="stylesheet" href="../css/dream_team.css">
    <title>Dream Team</title>
</head>
<body>
    <header>
        <div class="logo">
            <img src="../img/pokemon_logo.png" alt="Pokemon logo" width="40" height="40">
            <h1>Pokédex</h1>
        </div>
        <div class="buttons">
            <a href="../html/index.html"><button>Home</button></a>
            <a href="../html/pokemon_list.html"><button>Pokemon List</button></a>
            <a href="../html/dream_team.html"><button>Dream Team</button></a>
        </div>
    </header>

    <div id="empty-state" class="page-container">
        <h1>Dream Team</h1>
        <div class="white-frame empty">
            <p>Click ⭐ to start your collection</p>
        </div>
    </div>

    <div id="filled-state" class="page-container hidden">
        <div id="pokemon-frame" class="white-frame">

            <div class="frame-title">Dream team</div>

            <div class="team-stage">
                <div id="team-pokemon"></div>
            </div>

            <div id="team-icons"></div>

        </div>
        <button id="clear-btn">Clear</button>
    </div>

    <footer>
        <p>© Pokémon 2024</p>
    </footer>

    <script type="module" src="../dist/dream_team.js"></script>
</body>
</html>
