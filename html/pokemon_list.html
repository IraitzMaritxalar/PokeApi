<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/pokemon_list.css">
    <title>Home</title>
</head>

<body>
    <header>
    <div class="logo">
        <img src="../img/pokemon_logo.png" alt="Logo de pokemon" width="40" height="40">
        <h1>Pokédex</h1>
    </div>
    <div class="buttons">
        <a href="../html/index.html">
            <button id="homeBtn">Home</button>
        </a>

        <a href="../html/pokemon_list.html">
            <button id="pokemonBtn">Pokemon List</button>
        </a>
    </div>
    </header>

    <form class="searchForm">
        <label for="pokemonSearch" class="sr-only">Buscar Pokémon</label>
        <div class="inputWrapper">
            <img src="../img/lupa.png" alt="Logo de una lupa" class="icon">
            <input type="text" class="pokemonSearch" name="pokemonSearch" placeholder="Search a Pokémon">
        </div>
    </form>
    <div id="error">
        <img src="../img/Alert.png" alt="Logo de Alert">
        <a>An error occurred getting Pokémons.</a> 
        <a>Please, try it later</a>
    </div>

    <div id="no-pokemon">
        <img src="../img/PokeNot.png" alt="Logo de no hay Pokemon"/>
        <a>There is no results</a>
    </div>
    <ul id="loader">
        <li class="loader_card"><img src="../img/card_hutsa.png" alt="Pokemon cargando" width="320" height="480"></li>
        <li class="loader_card"><img src="../img/card_hutsa.png" alt="Pokemon cargando" width="320" height="480"></li>
        <li class="loader_card"><img src="../img/card_hutsa.png" alt="Pokemon cargando" width="320" height="480"></li>
        <li class="loader_card"><img src="../img/card_hutsa.png" alt="Pokemon cargando" width="320" height="480"></li>
        <li class="loader_card"><img src="../img/card_hutsa.png" alt="Pokemon cargando" width="320" height="480"></li>
        <li class="loader_card"><img src="../img/card_hutsa.png" alt="Pokemon cargando" width="320" height="480"></li>
    </ul>
    <ul class="pokemon_list" id="pokemonList"></ul>

    <footer>
        <p>2024 Pokémon. 1995 - 2024 Nintendo/Creatures Inc./GAME FREAK inc. TM, Nintendo.</p>
    </footer>
    <script type="module" src="../js/pokemon_list.js"></script>
</body>
</html>
